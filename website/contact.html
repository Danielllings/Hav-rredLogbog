<!DOCTYPE html>
<html lang="da" data-lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontakt — Havørred Logbog</title>
  <meta name="theme-color" content="#0D0D0F">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-body">
  <!-- Nav -->
  <nav class="nav scrolled" id="nav">
    <div class="container nav-inner">
      <a href="/" class="nav-brand">
        <img src="assets/icon.png" alt="Havørred Logbog" class="nav-icon">
        <span>Havørred Logbog</span>
      </a>
      <div class="nav-links">
        <button class="lang-toggle" id="langToggle" aria-label="Skift sprog">
          <span class="lang-flag" id="langFlag">🇩🇰</span>
          <span class="lang-label" id="langLabel">DA</span>
        </button>
        <a href="/#download" class="nav-cta" data-da="Download" data-en="Download">Download</a>
      </div>
    </div>
  </nav>

  <main class="page-content">
    <div class="container">
      <a href="/" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        <span data-da="Tilbage" data-en="Back">Tilbage</span>
      </a>

      <div class="page-card contact-card">
        <div class="page-header">
          <div class="page-icon-wrap">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
          <h1 data-da="Kontakt os" data-en="Contact us">Kontakt os</h1>
          <p class="page-date" data-da="Vi svarer normalt inden for 24 timer." data-en="We usually respond within 24 hours.">Vi svarer normalt inden for 24 timer.</p>
        </div>

        <form class="contact-form" id="contactForm" novalidate>
          <!-- Name -->
          <div class="form-group">
            <label for="contact-name" data-da="Navn" data-en="Name">Navn</label>
            <input type="text" id="contact-name" name="name" required autocomplete="name"
              data-da-placeholder="Dit navn" data-en-placeholder="Your name" placeholder="Dit navn">
          </div>

          <!-- Email -->
          <div class="form-group">
            <label for="contact-email" data-da="E-mail" data-en="Email">E-mail</label>
            <input type="email" id="contact-email" name="email" required autocomplete="email"
              data-da-placeholder="din@email.dk" data-en-placeholder="your@email.com" placeholder="din@email.dk">
          </div>

          <!-- Subject -->
          <div class="form-group">
            <label for="contact-subject" data-da="Emne" data-en="Subject">Emne</label>
            <div class="select-wrap">
              <select id="contact-subject" name="subject" required>
                <option value="" disabled selected data-da="Vælg et emne..." data-en="Select a subject...">Vælg et emne...</option>
                <option value="general" data-da="Generel support" data-en="General support">Generel support</option>
                <option value="question" data-da="Spørgsmål om appen" data-en="Question about the app">Spørgsmål om appen</option>
                <option value="bug" data-da="Fejlrapport" data-en="Bug report">Fejlrapport</option>
                <option value="feature" data-da="Feature-forslag" data-en="Feature request">Feature-forslag</option>
                <option value="delete-account" data-da="Slet min konto" data-en="Delete my account">Slet min konto</option>
                <option value="delete-data" data-da="Slet mine data" data-en="Delete my data">Slet mine data</option>
                <option value="privacy" data-da="Privatlivsspørgsmål" data-en="Privacy question">Privatlivsspørgsmål</option>
                <option value="other" data-da="Andet" data-en="Other">Andet</option>
              </select>
              <svg class="select-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>

          <!-- Message -->
          <div class="form-group">
            <label for="contact-message" data-da="Besked" data-en="Message">Besked</label>
            <textarea id="contact-message" name="message" rows="5" required
              data-da-placeholder="Beskriv hvad vi kan hjælpe med..." data-en-placeholder="Describe what we can help with..."></textarea>
          </div>

          <!-- Submit -->
          <button type="submit" class="contact-submit" id="contactSubmit">
            <span class="submit-text" data-da="Send besked" data-en="Send message">Send besked</span>
            <span class="submit-sending" data-da="Sender..." data-en="Sending...">Sender...</span>
            <svg class="submit-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </form>

        <!-- Success message (hidden by default) -->
        <div class="contact-success" id="contactSuccess">
          <div class="success-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          </div>
          <h3 data-da="Besked sendt!" data-en="Message sent!">Besked sendt!</h3>
          <p data-da="Tak for din henvendelse. Vi vender tilbage hurtigst muligt." data-en="Thanks for reaching out. We'll get back to you as soon as possible.">Tak for din henvendelse. Vi vender tilbage hurtigst muligt.</p>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <img src="assets/icon.png" alt="" class="footer-icon">
        <span>Havørred Logbog</span>
      </div>
      <nav class="footer-links">
        <a href="privacy.html" data-da="Privatlivspolitik" data-en="Privacy Policy">Privatlivspolitik</a>
        <a href="delete-account.html" data-da="Slet konto" data-en="Delete Account">Slet konto</a>
        <a href="contact.html" data-da="Kontakt" data-en="Contact">Kontakt</a>
      </nav>
      <p class="footer-copy">&copy; 2026 Havørred Logbog</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    (function() {
      const form = document.getElementById('contactForm');
      const success = document.getElementById('contactSuccess');
      const btn = document.getElementById('contactSubmit');
      if (!form) return;

      // Update placeholders on language change
      function updatePlaceholders() {
        const lang = document.documentElement.getAttribute('data-lang') || 'da';
        form.querySelectorAll('[data-da-placeholder]').forEach(el => {
          el.placeholder = el.getAttribute('data-' + lang + '-placeholder');
        });
        const ta = document.getElementById('contact-message');
        if (ta) ta.placeholder = ta.getAttribute('data-' + lang + '-placeholder');
      }

      const langBtn = document.getElementById('langToggle');
      if (langBtn) langBtn.addEventListener('click', () => setTimeout(updatePlaceholders, 50));
      updatePlaceholders();

      form.addEventListener('submit', async function(e) {
        e.preventDefault();

        const name = document.getElementById('contact-name').value.trim();
        const email = document.getElementById('contact-email').value.trim();
        const subject = document.getElementById('contact-subject');
        const subjectText = subject.options[subject.selectedIndex].textContent;
        const message = document.getElementById('contact-message').value.trim();

        if (!name || !email || !subject.value || !message) return;

        btn.classList.add('sending');
        btn.disabled = true;

        try {
          const res = await fetch('send-contact.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, subject: subjectText, message })
          });

          if (res.ok) {
            form.style.display = 'none';
            success.style.display = 'flex';
          } else {
            const data = await res.json();
            alert(data.error || 'Noget gik galt. Prøv igen.');
            btn.classList.remove('sending');
            btn.disabled = false;
          }
        } catch (err) {
          alert('Kunne ikke sende. Tjek din forbindelse og prøv igen.');
          btn.classList.remove('sending');
          btn.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
